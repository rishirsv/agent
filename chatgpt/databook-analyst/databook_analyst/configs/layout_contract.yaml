version: v1.1-packF-validated
source_workbook: output/spreadsheet/databook-template-v1-final-validated.xlsx
template_note: 'Template scaffold v1: Packs A-F merged and validated; synthetic harness
  loaded, anchors/keys under release governance.'
sheet_order:
- Cover
- Control | Setup
- Control | QC
- Template | Index
- Data | TB
- Data | AR Aging
- Data | AP Aging
- Map | COA to Lines
- Map | NWC & NetDebt Class
- Map | Entities
- Financials>>
- Combined | IS
- Combined | BS
- Combined | CF
- Entity 1 | IS
- Entity 1 | BS
- Entity 1 | CF
- QofE>>
- QofE | Summary
- QofE | Detail
- NWC>>
- NWC | Summary
- NWC | Detail
- NWC | Days
- Stratified | BS
- Net_debt
- Recons
- Agings
- Personnel
- Capex
- Leases
- Other | Analysis
sheet_view:
  default:
    show_gridlines: false
    zoom_scale: 100
    zoom_scale_normal: 100
  divider_overrides:
    view: pageBreakPreview
    sheets:
    - Financials>>
    - QofE>>
    - NWC>>
structure:
  use_standard_ranges_only: true
  no_excel_tables: true
  no_merged_cells_in_output_blocks: true
  no_named_ranges_required_for_logic: true
  b8_units_required_for_analysis_grids: true
  source_line_required_at_a2_non_divider_sheets: true
format_scope_rules:
  qofe_summary_last_formatted_column: J
  nwc_summary_last_formatted_column: L
  remove_styled_rows_below_final_totals: true
manifest:
- module_key: CORE_CONTROLS
  module_name: Controls
  sheet_names: Control | Setup; Control | QC
  purpose: Template controls and QC center
  primary_inputs: Manual setup
  dependencies: None
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_DATA
  module_name: Data intake
  sheet_names: Data | TB; Data | AR Aging; Data | AP Aging
  purpose: Standardized data ingestion blocks
  primary_inputs: Client exports
  dependencies: Control | Setup
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_MAPPING
  module_name: Mappings
  sheet_names: Map | COA to Lines; Map | NWC & NetDebt Class; Map | Entities
  purpose: Account and classification mappings
  primary_inputs: TB + team mapping decisions
  dependencies: Data | TB
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_FINANCIALS
  module_name: Financial statements
  sheet_names: Financials>>; Combined | IS; Combined | BS; Combined | CF; Entity 1
    | IS; Entity 1 | BS; Entity 1 | CF
  purpose: Core financial statement scaffolds for combined and placeholder entity
    views
  primary_inputs: Control | Setup; Data | TB; Map | COA to Lines
  dependencies: Pack A tabs
  typical_use_cases: All deals
  can_instantiate_multiple: 'TRUE'
- module_key: CORE_QOFE
  module_name: QofE
  sheet_names: QofE>>; QofE | Summary; QofE | Detail
  purpose: QofE scaffold outputs
  primary_inputs: Control | Setup; Data | TB; Map | COA to Lines
  dependencies: Pack A
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_NWC
  module_name: NWC
  sheet_names: NWC>>; NWC | Summary; NWC | Detail; NWC | Days; Stratified | BS
  purpose: NWC and stratification scaffolds
  primary_inputs: Control | Setup; Data | TB; Map | NWC & NetDebt Class
  dependencies: Pack A
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_NETDEBT
  module_name: Net debt
  sheet_names: Net_debt
  purpose: Net debt scaffold output
  primary_inputs: Map | NWC & NetDebt Class; Stratified | BS
  dependencies: CORE_NWC
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_RECONS
  module_name: Reconciliations
  sheet_names: Recons
  purpose: Cross-tab reconciliation mini-grids
  primary_inputs: Core output checks
  dependencies: Combined | IS; Combined | BS; Combined | CF
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_AGINGS
  module_name: Agings
  sheet_names: Agings
  purpose: AR/AP aging blocks with canonical buckets and tie-outs
  primary_inputs: Data | AR Aging; Data | AP Aging
  dependencies: Combined | BS
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_QC
  module_name: QC dashboard
  sheet_names: Control | QC
  purpose: Centralized workbook check status
  primary_inputs: Check cells across core sheets
  dependencies: All core modules
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: CORE_COVER
  module_name: Cover
  sheet_names: Cover
  purpose: Workbook landing and navigation dashboard
  primary_inputs: Control | QC
  dependencies: All modules
  typical_use_cases: All deals
  can_instantiate_multiple: 'FALSE'
- module_key: MOD_PERSONNEL
  module_name: Personnel
  sheet_names: Personnel
  purpose: Personnel analytics scaffold
  primary_inputs: Data | TB
  dependencies: Control | Setup; Map | COA to Lines
  typical_use_cases: Deals with payroll workstreams
  can_instantiate_multiple: 'FALSE'
- module_key: MOD_CAPEX
  module_name: Capex
  sheet_names: Capex
  purpose: Capex analytics scaffold
  primary_inputs: Data | TB
  dependencies: Control | Setup; Map | COA to Lines
  typical_use_cases: Capex-heavy deals
  can_instantiate_multiple: 'FALSE'
- module_key: MOD_LEASES
  module_name: Leases
  sheet_names: Leases
  purpose: Leases analytics scaffold
  primary_inputs: Lease schedules; Data | TB
  dependencies: Control | Setup; Map | COA to Lines
  typical_use_cases: Deals with material leasing
  can_instantiate_multiple: 'FALSE'
- module_key: MOD_OTHER_ANALYSIS
  module_name: Other analysis
  sheet_names: Other | Analysis
  purpose: Flexible analysis scaffold
  primary_inputs: Deal-specific supporting data
  dependencies: Control | Setup
  typical_use_cases: Custom analyses
  can_instantiate_multiple: 'FALSE'
